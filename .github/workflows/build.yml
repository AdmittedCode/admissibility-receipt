name: Build
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install -e .
      - run: python -m pytest
      - run: python tools/verify_gcat_bcat_intake.py
      - run: git diff --exit-code -- dist
